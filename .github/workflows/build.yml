# Rebuilds docs/index.html whenever the template or data changes, and once a
# week on a schedule. This is what makes a dashboard feel "live" without any
# server: GitHub runs the build for you and commits the result back.
#
# Once this is working, add a step before "Build" that fetches fresh data into
# data/ (curl an API, run a script) and the page updates itself forever.
#
# GitHub Pages must be set to: Settings -> Pages -> Deploy from a branch ->
# main / docs.

name: Build

on:
  push:
    branches: [main]
    paths:
      - 'template.html'
      - 'data/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  schedule:
    # 06:00 UTC every Monday. Cron is always UTC — adjust for your timezone.
    - cron: '0 6 * * 1'
  workflow_dispatch:   # adds a "Run workflow" button in the Actions tab

permissions:
  contents: write      # needed to commit the rebuilt page back

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build
        run: python scripts/pipeline.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          # --quiet exits non-zero when there IS a change; that is the signal to commit.
          git diff --staged --quiet || git commit -m "build: rebuild dashboard [skip ci]"
          git push
